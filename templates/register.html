<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

<div class="login-card">

    <h2>📝 Register</h2>

    <form method="POST">

        <input type="text"
               name="username"
               class="form-control"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Password"
               required>

        <button type="submit"
                class="btn btn-success">
            Create Account
        </button>

    </form>

    <div class="text-center mt-3">

        Already have an account?

        <a href="/login">
            Login
        </a>

    </div>

</div>

</body>
</html>
